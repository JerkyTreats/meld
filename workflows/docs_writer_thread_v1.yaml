workflow_id: docs_writer_thread_v1
version: 1
title: Docs Writer Turn Workflow
description: Four turn docs generation with deterministic gates
thread_policy:
  start_conditions:
    require_directory_target: true
    require_target_head: true
  dedupe_key_fields:
    - workflow_id
    - target_node_id
    - target_frame_id
  max_turn_retries: 1
turns:
  - turn_id: evidence_gather
    seq: 1
    title: Gather Evidence
    prompt_ref: prompts/docs_writer/evidence_gather.md
    input_refs:
      - target_context
    output_type: evidence_map
    gate_id: evidence_gate
    retry_limit: 1
    timeout_ms: 60000
  - turn_id: verification
    seq: 2
    title: Verify Claims
    prompt_ref: prompts/docs_writer/verification.md
    input_refs:
      - evidence_map
    output_type: verification_report
    gate_id: verification_gate
    retry_limit: 1
    timeout_ms: 60000
  - turn_id: readme_struct
    seq: 3
    title: Build Readme Structure
    prompt_ref: prompts/docs_writer/readme_struct.md
    input_refs:
      - verification_report
    output_type: readme_struct
    gate_id: struct_gate
    retry_limit: 1
    timeout_ms: 60000
  - turn_id: style_refine
    seq: 4
    title: Refine Style
    prompt_ref: prompts/docs_writer/style_refine.md
    input_refs:
      - readme_struct
    output_type: readme_final
    gate_id: style_gate
    retry_limit: 1
    timeout_ms: 60000
gates:
  - gate_id: evidence_gate
    gate_type: schema_required_fields
    required_fields:
      - claims
    rules: null
    fail_on_violation: false
  - gate_id: verification_gate
    gate_type: schema_required_fields
    required_fields:
      - verified_claims
    rules: null
    fail_on_violation: false
  - gate_id: struct_gate
    gate_type: required_sections
    required_fields:
      - title
    rules:
      forbidden_sections:
        - evidence_map
    fail_on_violation: false
  - gate_id: style_gate
    gate_type: no_semantic_drift
    required_fields: []
    rules:
      forbidden_sections:
        - evidence map
      required_sections_from_input: readme_struct
    fail_on_violation: false
artifact_policy:
  store_output: true
  store_prompt_render: true
  store_context_payload: true
  max_output_bytes: 262144
failure_policy:
  mode: fail_fast
  resume_from_failed_turn: true
  stop_on_gate_fail: false
thread_profile: docs_writer_default
target_agent_id: docs-writer
target_frame_type: context-docs-writer
final_artifact_type: readme_final
